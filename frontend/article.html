<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Article - Hassan News</title>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- GSAP CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    
    <!-- Tailwind Dark Mode Configuration -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#1e40af',
                        secondary: '#64748b'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 transition-colors duration-200">
    
    <!-- Header -->
    <header class="bg-white dark:bg-gray-800 shadow-md sticky top-0 z-50">
        <div class="container mx-auto px-4 py-4">
            <div class="flex items-center justify-between flex-wrap gap-4">
                <!-- Logo -->
                <div class="flex items-center">
                    <a href="index.html" class="flex items-center gap-2 text-2xl font-bold text-primary dark:text-blue-400">
                        <img src="logo.jpg" alt="Hassan News Logo" class="w-8 h-8 object-contain" onerror="this.style.display='none';">
                        <span>Hassan News</span>
                    </a>
                </div>
                
                <!-- Navigation -->
                <nav class="flex items-center gap-6 flex-wrap">
                    <a href="index.html" class="text-gray-700 dark:text-gray-300 hover:text-primary dark:hover:text-blue-400 transition-colors">
                        Home
                    </a>
                </nav>
                
                <!-- Search Bar -->
                <div class="flex items-center gap-4">
                    <form id="searchForm" class="relative">
                        <input 
                            type="text" 
                            id="searchInput" 
                            placeholder="Search articles..." 
                            class="w-64 px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-primary"
                        >
                        <button type="submit" class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-500 dark:text-gray-400 hover:text-primary">
                            🔍
                        </button>
                    </form>
                    
                    <!-- Theme Toggle Button -->
                    <button 
                        id="themeToggle" 
                        class="p-2 rounded-lg bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600 transition-colors"
                        aria-label="Toggle theme"
                    >
                        <span class="dark:hidden">🌙</span>
                        <span class="hidden dark:inline">☀️</span>
                    </button>
                </div>
            </div>
        </div>
    </header>
    
    <!-- Main Content -->
    <main class="container mx-auto px-4 py-8">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Article Content (Left Column - 2/3 width) -->
            <div class="lg:col-span-2">
                <!-- Article Header -->
                <article id="articleContent" class="bg-white dark:bg-gray-800 rounded-lg shadow-md overflow-hidden">
                    <!-- Article will be dynamically inserted here -->
                </article>
                

            </div>
            
            <!-- Related Articles Sidebar (Right Column - 1/3 width) -->
            <aside class="lg:col-span-1">
                <div class="bg-white dark:bg-gray-800 rounded-lg shadow-md p-6 sticky top-24">
                    <h2 class="text-xl font-bold mb-4">Related Articles</h2>
                    <div id="relatedArticles" class="space-y-4">
                        <!-- Related articles will be dynamically inserted here -->
                    </div>
                    
                    <!-- No Related Articles State -->
                    <div id="noRelated" class="text-center py-8 text-gray-500 dark:text-gray-400 hidden">
                        No related articles found
                    </div>
                </div>
            </aside>
        </div>
        
        <!-- Loading State -->
        <div id="loadingState" class="text-center py-12">
            <div class="inline-block animate-spin rounded-full h-12 w-12 border-b-2 border-primary"></div>
            <p class="mt-4 text-gray-600 dark:text-gray-400">Loading article...</p>
        </div>
        
        <!-- Error State -->
        <div id="errorState" class="text-center py-12 hidden">
            <p class="text-xl text-red-600 dark:text-red-400">Article not found</p>
            <a href="index.html" class="inline-block mt-4 px-6 py-2 bg-primary text-white rounded-lg hover:bg-blue-700 transition-colors">
                Back to Home
            </a>
        </div>
    </main>
    
    <!-- Footer -->
    <footer class="bg-white dark:bg-gray-800 shadow-md mt-12">
        <div class="container mx-auto px-4 py-6">
            <div class="text-center text-gray-600 dark:text-gray-400 text-sm">
                <p>&copy; 2024 Hassan News. All rights reserved.</p>
            </div>
        </div>
    </footer>
    
    <!-- Scripts -->
    <script src="js/theme.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/timeUtils.js"></script>
    <script src="js/navigation.js"></script>
    <script src="js/article.js"></script>
</body>
</html>
