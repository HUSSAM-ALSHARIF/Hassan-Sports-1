<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Hassan News</title>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- GSAP CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    
    <!-- Tailwind Dark Mode Configuration -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#1e40af',
                        secondary: '#64748b'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 transition-colors duration-200">
    
    <!-- Header -->
    <header class="bg-white dark:bg-gray-800 shadow-md sticky top-0 z-50">
        <div class="container mx-auto px-4 py-4">
            <div class="flex items-center justify-between flex-wrap gap-4">
                <!-- Logo -->
                <div class="flex items-center">
                    <a href="index.html" class="flex items-center gap-2 text-2xl font-bold text-primary dark:text-blue-400">
                        <img src="logo.jpg" alt="Hassan News Logo" class="w-8 h-8 object-contain" onerror="this.style.display='none';">
                        <span>Hassan News</span>
                    </a>
                </div>
                
                <!-- Navigation -->
                <nav class="flex items-center gap-6 flex-wrap">
                    <a href="index.html" class="text-gray-700 dark:text-gray-300 hover:text-primary dark:hover:text-blue-400 transition-colors">
                        Home
                    </a>
                    <a href="dashboard.html" class="text-primary dark:text-blue-400 font-medium">
                        Dashboard
                    </a>
                    <a href="admin.html" class="text-gray-700 dark:text-gray-300 hover:text-primary dark:hover:text-blue-400 transition-colors hidden" id="adminLink">
                        Admin
                    </a>
                    <button id="logoutBtn" class="text-gray-700 dark:text-gray-300 hover:text-primary dark:hover:text-blue-400 transition-colors">
                        Logout
                    </button>
                </nav>
                
                <!-- Theme Toggle Button -->
                <button 
                    id="themeToggle" 
                    class="p-2 rounded-lg bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600 transition-colors"
                    aria-label="Toggle theme"
                >
                    <span class="dark:hidden">🌙</span>
                    <span class="hidden dark:inline">☀️</span>
                </button>
            </div>
        </div>
    </header>
    
    <!-- Main Content -->
    <main class="container mx-auto px-4 py-8">
        <h1 class="text-3xl font-bold mb-8">My Dashboard</h1>
        
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <!-- Profile Section -->
            <div class="bg-white dark:bg-gray-800 rounded-lg shadow-md p-6">
                <h2 class="text-2xl font-bold mb-6">Profile</h2>
                
                <!-- Profile Display -->
                <div id="profileDisplay" class="space-y-4 mb-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-1">Username</label>
                        <p id="displayUsername" class="text-lg font-semibold">-</p>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-1">Email</label>
                        <p id="displayEmail" class="text-lg">-</p>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-1">Member Since</label>
                        <p id="displayMemberSince" class="text-lg">-</p>
                    </div>
                </div>
                
                <!-- Edit Profile Form -->
                <div class="border-t border-gray-200 dark:border-gray-700 pt-6">
                    <h3 class="text-xl font-semibold mb-4">Edit Profile</h3>
                    <form id="editProfileForm" class="space-y-4">
                        <div>
                            <label for="newUsername" class="block text-sm font-medium mb-2">New Username</label>
                            <input 
                                type="text" 
                                id="newUsername" 
                                class="w-full px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-primary"
                            >
                        </div>
                        <div>
                            <label for="newEmail" class="block text-sm font-medium mb-2">New Email</label>
                            <input 
                                type="email" 
                                id="newEmail" 
                                class="w-full px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-primary"
                            >
                        </div>
                        <button 
                            type="submit" 
                            class="px-6 py-2 bg-primary text-white rounded-lg hover:bg-blue-700 transition-colors font-medium"
                        >
                            Update Profile
                        </button>
                    </form>
                </div>
                
                <!-- Change Password Form -->
                <div class="border-t border-gray-200 dark:border-gray-700 pt-6 mt-6">
                    <h3 class="text-xl font-semibold mb-4">Change Password</h3>
                    <form id="changePasswordForm" class="space-y-4">
                        <div>
                            <label for="currentPassword" class="block text-sm font-medium mb-2">Current Password</label>
                            <input 
                                type="password" 
                                id="currentPassword" 
                                class="w-full px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-primary"
                                required
                            >
                        </div>
                        <div>
                            <label for="newPassword" class="block text-sm font-medium mb-2">New Password</label>
                            <input 
                                type="password" 
                                id="newPassword" 
                                class="w-full px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-primary"
                                required
                                minlength="6"
                            >
                        </div>
                        <div>
                            <label for="confirmNewPassword" class="block text-sm font-medium mb-2">Confirm New Password</label>
                            <input 
                                type="password" 
                                id="confirmNewPassword" 
                                class="w-full px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-primary"
                                required
                            >
                        </div>
                        <button 
                            type="submit" 
                            class="px-6 py-2 bg-primary text-white rounded-lg hover:bg-blue-700 transition-colors font-medium"
                        >
                            Change Password
                        </button>
                    </form>
                </div>
            </div>
            
            <!-- Favorites Section -->
            <div class="bg-white dark:bg-gray-800 rounded-lg shadow-md p-6">
                <h2 class="text-2xl font-bold mb-6">My Favorites</h2>
                
                <div id="favoritesList" class="space-y-4">
                    <!-- Favorites will be dynamically inserted here -->
                </div>
                
                <div id="noFavorites" class="text-center py-8 text-gray-500 dark:text-gray-400 hidden">
                    No favorite articles yet
                </div>
            </div>
        </div>
        
        <!-- My Comments Section -->
        <div class="bg-white dark:bg-gray-800 rounded-lg shadow-md p-6 mt-8">
            <h2 class="text-2xl font-bold mb-6">My Comments</h2>
            
            <div id="commentsList" class="space-y-4">
                <!-- Comments will be dynamically inserted here -->
            </div>
            
            <div id="noComments" class="text-center py-8 text-gray-500 dark:text-gray-400 hidden">
                No comments yet
            </div>
        </div>
    </main>
    
    <!-- Footer -->
    <footer class="bg-white dark:bg-gray-800 shadow-md mt-12">
        <div class="container mx-auto px-4 py-6">
            <div class="text-center text-gray-600 dark:text-gray-400 text-sm">
                <p>&copy; 2024 Hassan News. All rights reserved.</p>
            </div>
        </div>
    </footer>
    
    <!-- Scripts -->
    <script src="js/theme.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
